spring:
  application:
    name: accm-referential
  datasource:
    url: jdbc:postgresql://localhost:5432/accm
    username: accm
    password: accm
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: referential
  flyway:
    enabled: true
    schemas: referential
    default-schema: referential
  threads:
    virtual:
      enabled: true

server:
  port: 8082

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
